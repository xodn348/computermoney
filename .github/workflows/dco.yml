name: DCO

on:
  pull_request:

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check that every commit is signed off
        run: |
          missing=0
          for c in $(git rev-list ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}); do
            if ! git log -1 --format=%B "$c" | grep -q '^Signed-off-by: '; then
              echo "::error::commit $c is missing a Signed-off-by line (use: git commit -s)"
              missing=1
            fi
          done
          exit $missing
